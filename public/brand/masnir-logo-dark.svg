<svg width="500" height="620" viewBox="0 0 500 620" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="500" height="620" fill="#17212B"/>

  <defs>
    <clipPath id="circleClip">
      <circle cx="250" cy="215" r="185"/>
    </clipPath>
  </defs>

  <!-- Icon backdrop -->
  <circle cx="250" cy="215" r="185" fill="#FFFFFF" stroke="#EAEBEC" stroke-width="1.5"/>

  <!-- Mountain emblem -->
  <g clip-path="url(#circleClip)">
    <polygon points="85,440 175,75 250,205 250,440" fill="#2C3E50" stroke="#FFFFFF" stroke-width="9" stroke-linejoin="round"/>
    <polygon points="250,440 250,205 325,75 415,440" fill="#C0392B" stroke="#FFFFFF" stroke-width="9" stroke-linejoin="round"/>
    <polygon points="120,440 200,150 250,235 250,440" fill="#24313F" stroke="#FFFFFF" stroke-width="9" stroke-linejoin="round"/>
    <polygon points="250,440 250,235 300,150 380,440" fill="#9C3327" stroke="#FFFFFF" stroke-width="9" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="59" y="540" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="92" fill="#FFFFFF" textLength="77" lengthAdjust="spacingAndGlyphs">M</text>
  <polygon points="145.44,540 211.44,540 178.44,464" fill="#C0392B"/>
  <text x="221.44" y="540" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="92" fill="#FFFFFF" textLength="220" lengthAdjust="spacingAndGlyphs">SNIR</text>
</svg>
